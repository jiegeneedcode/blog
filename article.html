<html lang="zh-CN" data-theme="dark">
<head>

  <style>
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold: #d4af37; --gold-light: #f4d03f; --gold-dark: #b8960c;
      --accent: #6c63ff; --accent-light: #8b83ff;
      --bg: #0a0a0f; --bg-elevated: #12121a; --bg-card: #16161f; --bg-card-hover: #1c1c28;
      --text: #e2e8f0; --text-secondary: #94a3b8; --text-muted: #64748b;
      --border: rgba(212, 175, 55, 0.12); --border-light: rgba(148, 163, 184, 0.08);
      --radius: 12px; --radius-lg: 16px; --shadow: 0 4px 20px rgba(0,0,0,0.4);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --font-cursive: 'Caveat', cursive;
    }
    [data-theme="light"] {
      --bg: #f8fafc; --bg-elevated: #ffffff; --bg-card: #ffffff; --bg-card-hover: #f1f5f9;
      --text: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
      --border: rgba(212, 175, 55, 0.2); --border-light: rgba(148, 163, 184, 0.15);
    }
    html { scroll-behavior: smooth; scroll-padding-top: 100px; }
    body {
      font-family: var(--font-sans); background: var(--bg); color: var(--text);
      line-height: 1.7; min-height: 100vh; overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* Reading progress bar */
    .reading-progress {
      position: fixed; top:0; left:0; height: 3px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
      z-index: 1001; transition: width 0.1s linear;
    }

    /* Nav */
    nav {
      position: fixed; top:3px; left:0; right:0; z-index: 1000;
      padding: 1rem 2rem;
      background: rgba(10,10,15,0.88); backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    [data-theme="light"] nav { background: rgba(248,250,252,0.88); }
    .nav-logo {
      font-family: var(--font-cursive); font-size: 1.8rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; letter-spacing: 2px;
    }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a {
      color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;
      transition: color var(--transition); text-decoration: none; position: relative;
    }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--gold); transition: width var(--transition); }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }
    .theme-toggle {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg-card);
      cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .theme-toggle:hover { border-color: var(--gold); transform: scale(1.1); }

    /* Article layout */
    .article-layout {
      display: grid; grid-template-columns: 220px 1fr 220px;
      max-width: 1400px; margin: 0 auto; padding: 7rem 2rem 3rem;
      gap: 2rem;
    }
    .article-main { min-width: 0; }
    .article-sidebar { position: sticky; top: 100px; align-self: start; max-height: calc(100vh - 120px); overflow-y: auto; }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--text-muted); text-decoration: none; font-size: 0.9rem;
      margin-bottom: 2rem; transition: color var(--transition);
    }
    .back-link:hover { color: var(--gold); }

    /* Article header */
    .article-header { margin-bottom: 2rem; }
    .article-category {
      display: inline-block; padding: 0.25rem 0.8rem;
      border-radius: 10px; font-size: 0.78rem; font-weight: 600; margin-bottom: 1rem;
    }
    .cat-ai { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .cat-dev { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .cat-tips { background: rgba(34,197,94,0.15); color: #4ade80; }

    .article-title {
      font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 800;
      line-height: 1.3; margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--text), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .article-meta {
      display: flex; gap: 1.5rem; color: var(--text-muted);
      font-size: 0.88rem; flex-wrap: wrap;
    }
    .article-cover {
      height: 280px; display: flex; align-items: center; justify-content: center;
      font-size: 5rem; border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(108,99,255,0.06), rgba(212,175,55,0.04));
      border: 1px solid var(--border); margin-bottom: 2.5rem;
    }

    /* Table of Contents */
    .toc { position: sticky; top: 100px; }
    .toc h4 {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;
      color: var(--text-muted); margin-bottom: 1rem;
    }
    .toc nav { position: static; background: none; backdrop-filter: none; border: none; padding: 0; display: block; }
    .toc nav a {
      display: block; padding: 0.35rem 0; font-size: 0.82rem;
      color: var(--text-muted); text-decoration: none;
      border-left: 2px solid transparent; padding-left: 0.75rem;
      transition: all var(--transition);
    }
    .toc nav a:hover, .toc nav a.active { color: var(--gold); border-left-color: var(--gold); }

    /* Article content */
    .article-content { font-size: 1.08rem; line-height: 1.9; color: var(--text); }
    .article-content h2 {
      font-size: 1.5rem; color: var(--gold); margin: 2.5rem 0 1rem;
      padding-left: 0.75rem; border-left: 3px solid var(--gold);
    }
    .article-content h3 { font-size: 1.2rem; margin: 2rem 0 0.75rem; color: var(--text); }
    .article-content p { margin-bottom: 1.3rem; color: var(--text-secondary); }
    .article-content ul, .article-content ol { margin: 1.2rem 0; padding-left: 1.5rem; }
    .article-content li { margin-bottom: 0.6rem; color: var(--text-secondary); }
    .article-content li::marker { color: var(--gold); }
    .article-content strong { color: var(--gold-light); font-weight: 600; }
    .article-content a { color: var(--accent-light); text-decoration: underline; }

    /* Code blocks */
    .code-block, .article-content pre {
      background: var(--bg-card); border-radius: var(--radius);
      padding: 1.5rem; margin: 1.5rem 0; border: 1px solid var(--border);
      overflow-x: auto; font-family: var(--font-mono); font-size: 0.85rem;
      line-height: 1.7;
    }
    .code-block .kw, .code-block .keyword { color: #c792ea; }
    .code-block .str, .code-block .string { color: #c3e88d; }
    .code-block .cmt, .code-block .comment { color: #546e7a; font-style: italic; }
    .code-block .fn, .code-block .function { color: #82aaff; }
    .code-block .num, .code-block .number { color: #f78c6c; }
    .code-block .prop { color: #82aaff; }

    /* Tip box */
    .tip-box {
      background: rgba(212, 175, 55, 0.06); border-left: 4px solid var(--gold);
      padding: 1.25rem 1.5rem; border-radius: 0 var(--radius) var(--radius) 0;
      margin: 1.5rem 0;
    }
    .tip-box strong { color: var(--gold); }

    /* Share buttons */
    .share-section {
      margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .share-section span { color: var(--text-muted); font-size: 0.9rem; }
    .share-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg-card);
      cursor: pointer; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .share-btn:hover { border-color: var(--gold); transform: scale(1.15); }

    /* Article footer */
    .article-footer { margin-top: 2rem; }
    .tags {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem;
    }
    .tag {
      padding: 0.3rem 0.8rem; font-size: 0.78rem; border-radius: 6px;
      background: rgba(212,175,55,0.06); border: 1px solid var(--border);
      color: var(--gold-light);
    }

    /* Related Posts */
    .related-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .related-section h3 { font-size: 1.2rem; margin-bottom: 1.5rem; color: var(--text); }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .related-card {
      padding: 1.25rem; background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); transition: all var(--transition);
      display: block; color: inherit; text-decoration: none;
    }
    .related-card:hover { border-color: var(--gold); transform: translateY(-3px); }
    .related-card h4 { font-size: 0.95rem; margin-bottom: 0.5rem; }
    .related-card p { font-size: 0.82rem; color: var(--text-muted); }

    /* Comments placeholder */
    .comments-section {
      margin-top: 3rem; padding: 2rem;
      background: var(--bg-card); border-radius: var(--radius-lg);
      border: 1px solid var(--border); text-align: center;
    }
    .comments-section h3 { margin-bottom: 0.5rem; }
    .comments-section p { color: var(--text-muted); font-size: 0.9rem; }

    /* Scroll top */
    .scroll-top {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 100;
      width: 44px; height: 44px; border-radius: 50%; background: var(--bg-card);
      border: 1px solid var(--border); color: var(--gold); font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all var(--transition); box-shadow: var(--shadow);
    }
    .scroll-top.visible { opacity: 1; visibility: visible; }
    .scroll-top:hover { border-color: var(--gold); transform: translateY(-4px); }

    footer { text-align: center; padding: 3rem 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; }

    /* Responsive */
    @media (max-width: 1024px) {
      .article-layout { grid-template-columns: 1fr; }
      .article-sidebar { display: none; }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .article-layout { padding: 6rem 1rem 2rem; }
      .article-cover { height: 180px; font-size: 3.5rem; }
      .article-content { font-size: 1rem; }
    }
  </style>
</head>

  <script>
    // ===== Theme =====
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('theme', next);
    });

    // ===== Reading Progress =====
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      document.getElementById('readingProgress').style.width = Math.min(progress, 100) + '%';
    });

    // ===== Article Data =====
    const articles = {
      'ai-agent': {
        id: 'ai-agent', title: 'AI Agent实战：国企投资岗位的智能化转型',
        category: 'AI', date: '2026-04-10', readTime: '10 min', icon: '🤖',
        tags: ['AI Agent', 'Claude', '效率提升', '国企数字化'],
        description: '作为一名国企投资岗位的工作人员，我每天需要处理大量的文档、报表、研报和会议纪要。自从接触了 AI Agent，我的工作方式发生了翻天覆地的变化...',
        content: '<h2>写在前面</h2><p>作为一名国企投资岗位的工作人员，我每天需要处理大量的文档、报表、研报和会议纪要。自从接触了 AI Agent，我的工作方式发生了翻天覆地的变化。今天来分享一下我在实际工作中使用 AI Agent 的经验。</p><h2>什么是 AI Agent？</h2><p>简单来说，AI Agent 是能够自主规划、执行任务并调用工具的智能系统。与普通的对话式 AI 不同，Agent 不仅能回答问题，还能：</p><ul><li>理解复杂任务并拆解为可执行的步骤</li><li>调用外部工具（搜索、代码执行、文件读写等）</li><li>根据反馈调整策略直到完成任务</li><li>记忆上下文，支持多轮交互</li></ul><h2>我的日常工作场景</h2><h3>1. 投资报告快速分析</h3><p>以前阅读一份50页的投资研报需要2-3小时，现在借助 Claude + Agent 框架，我可以：</p><ul><li>让 Agent 先通读全文，提取关键数据和结论</li><li>针对特定问题进行深度追问</li><li>自动生成摘要和要点列表</li></ul><div class="code-block"><span class="cmt">// 示例：使用 Claude 分析投资报告</span>\n<span class="kw">const</span> <span class="prop">analysisPrompt</span> = <span class="str">`请分析以下投资研报，提取：\n1. 核心投资逻辑\n2. 关键财务数据\n3. 风险提示\n4. 投资建议`</span>;</div><h3>2. 会议纪要自动化</h3><p>投资决策会议经常一开就是2-3个小时，手动整理纪要费时费力。现在我使用语音转文字+AI整理的组合：</p><ol><li>会议录音 → 语音转文字</li><li>文字稿 → AI 提取关键决策和待办事项</li><li>自动生成格式化的会议纪要</li></ol><h3>3. 数据表格处理</h3><p>投资岗位离不开 Excel，但复杂的数据透视和公式经常让人头疼。AI Agent 可以帮我：</p><ul><li>解释复杂公式的逻辑</li><li>编写 VBA 宏实现自动化</li><li>根据需求生成数据可视化图表</li></ul><div class="tip-box"><strong>💡 实战技巧</strong>：在国企场景下，数据安全和隐私是首要考虑。建议使用本地部署的模型（如 Ollama）处理敏感信息，联网模型仅用于非敏感内容的辅助写作。</div><h2>工具推荐</h2><p>基于我的实际使用经验，推荐以下工具组合：</p><ul><li><strong>Claude</strong> — 主力写作和分析工具，逻辑能力强</li><li><strong>Claude Code</strong> — 代码编写和自动化脚本</li><li><strong>MCP 协议</strong> — 连接本地文件和数据源</li><li><strong>Dify</strong> — 搭建团队内部的 AI 工作流</li></ul><h2>总结</h2><p>AI Agent 不是要取代我们的工作，而是帮助我们从繁琐的重复性工作中解放出来，有更多时间专注于真正的价值创造——投资判断和决策。在国企数字化转型的大背景下，掌握这些工具将成为职场竞争的重要优势。</p>'
      },
      'claude-code': {
        id: 'claude-code', title: '从0到1：用Claude Code构建个人知识库',
        category: 'Dev', date: '2026-04-08', readTime: '12 min', icon: '📚',
        tags: ['Claude Code', '知识管理', 'AI编程', '笔记系统'],
        description: '在国企投资岗位工作，每天接收的信息量巨大。最近我用 Claude Code + Markdown + Obsidian 搭建了一套个人知识管理系统...',
        content: '<h2>为什么需要个人知识库？</h2><p>在国企投资岗位工作，每天接收的信息量巨大：行业报告、政策文件、会议纪要、研究资料...如果没有一个好的知识管理系统，这些信息很快就会变得杂乱无章，难以复用。</p><p>最近我用 Claude Code + Markdown + Obsidian 搭建了一套个人知识管理系统，效果出乎意料的好。</p><h2>系统架构</h2><p>整体架构分为三个层次：</p><ul><li><strong>输入层</strong>：文档、图片、网页、语音等原始资料</li><li><strong>处理层</strong>：Claude Code 进行内容提取、分类、摘要</li><li><strong>存储层</strong>：Obsidian 知识库 + 本地文件</li></ul><h2>快速开始</h2><h3>第一步：创建项目结构</h3><div class="code-block"><span class="cmt"># 创建知识库目录结构</span>\nmkdir -p knowledge-base/{inbox,projects,areas,resources}</div><h3>第二步：配置 Claude Code</h3><p>在项目根目录创建 CLAUDE.md，定义知识库的管理规则：</p><div class="code-block"><span class="cmt"># CLAUDE.md — Claude Code 知识库配置</span>\n\n## 项目角色\n你是一个知识管理助手，帮助用户：\n- 整理和分类新收集的资料\n- 从文档中提取关键信息\n- 建立知识之间的关联\n- 生成定期的知识总结</div><h3>第三步：自动化处理流程</h3><p>创建一个自动化脚本，用于批量处理 inbox 中的新资料：</p><div class="code-block"><span class="cmt">#!/bin/bash</span>\n<span class="cmt"># process_inbox.sh — 处理收件箱中的新资料</span>\n\n<span class="kw">for</span> file <span class="kw">in</span> inbox/*; <span class="kw">do</span>\n  <span class="kw">if</span> [ -f <span class="str">"$file"</span> ]; <span class="kw">then</span>\n    <span class="cmt"># 调用 Claude 分析文档</span>\n    claude --print <span class="str">"分析这个文件：$file"</span>\n  <span class="kw">fi</span>\n<span class="kw">done</span></div><h2>实际效果</h2><p>使用这套系统后，我的改变：</p><ul><li>资料归档时间从每天 1 小时减少到 15 分钟</li><li>知识检索效率提升 3 倍以上</li><li>定期自动生成知识总结和待办清单</li><li>建立了跨文档的知识关联网络</li></ul><div class="tip-box"><strong>💡 小贴士</strong>：知识库的价值在于持续更新和定期回顾。建议设置每周五下午为"知识整理时间"，对一周收集的资料进行回顾和总结。</div><h2>进阶玩法</h2><p>如果你想进一步提升，可以考虑：</p><ul><li>接入向量数据库实现语义搜索</li><li>使用 Obsidian 的 Dataview 插件建立自动化视图</li><li>配置定时任务自动同步云端</li><li>与团队共享知识库实现协同</li></ul><h2>总结</h2><p>个人知识库不是一天建成的，关键是要坚持下去。从简单的文件夹管理开始，逐步引入 AI 辅助，你会发现知识管理变得越来越轻松。</p>'
      },
      'mcp-protocol': {
        id: 'mcp-protocol', title: 'MCP协议：让AI真正理解你的需求',
        category: 'AI', date: '2026-04-05', readTime: '8 min', icon: '🔗',
        tags: ['MCP', 'Claude', 'AI集成', '工具调用'],
        description: 'MCP（Model Context Protocol）是由 Anthropic 推出的开放协议，旨在让 AI 模型能够安全、标准化地与外部工具和数据源连接...',
        content: '<div class="tip-box"><strong>📌 核心要点</strong>：MCP（Model Context Protocol）是 Anthropic 推出的开放协议，为 AI 提供标准化的"工具调用接口"。它像 USB 一样，让任何 AI 都能即插即用地连接本地文件、数据库、API 和各种工具——数据不出本地，安全可控。</div><h2>MCP 是什么？</h2><p>MCP（Model Context Protocol，模型上下文协议）就是 AI 世界的 <strong>"USB 接口"</strong>。它定义了一套通用标准，让 Claude 等 AI 模型能安全、标准化地连接外部工具和数据源。</p><pre class="diagram">\n<span class="dim">┌──────────────────────────────────────────────┐</span>\n<span class="dim">│</span>              <span class="hl">AI 模型 (Claude / GPT)</span>              <span class="dim">│</span>\n<span class="dim">└──────────────────┬───────────────────────────┘</span>\n<span class="dim">                   │</span>  <span class="ye">MCP 协议 (标准 JSON-RPC)</span>\n<span class="dim">     ┌─────────────┼─────────────┐</span>\n<span class="dim">     ▼             ▼             ▼</span>\n<span class="dim">┌─────────┐ ┌─────────┐ ┌─────────┐</span>\n<span class="dim">│</span> <span class="gr">📁 文件</span>  <span class="dim">│ │</span> <span class="gr">🗄️ 数据库</span> <span class="dim">│ │</span> <span class="gr">🌐 API</span>   <span class="dim">│</span>\n<span class="dim">│</span> <span class="hl">Server</span>  <span class="dim">│ │</span> <span class="hl">Server</span>  <span class="dim">│ │</span> <span class="hl">Server</span>  <span class="dim">│</span>\n<span class="dim">└─────────┘ └─────────┘ └─────────┘</span>\n</pre><p>关键理念：<strong>AI 不直接访问数据，而是通过标准化的 MCP Server 来"翻译"请求</strong>。每个 Server 只暴露有限的能力，安全边界清晰。</p><h2>传统方式 vs MCP</h2><div class="table-wrap"><table><thead><tr><th>对比维度</th><th>传统方式</th><th>MCP 方式</th></tr></thead><tbody><tr><td>工具接入</td><td>每次手写 Prompt + API 代码</td><td>一次配置，标准化调用</td></tr><tr><td>数据安全</td><td>数据上传云端，风险难控</td><td>本地处理，数据不出网</td></tr><tr><td>扩展性</td><td>加一个工具改一次代码</td><td>即插即用，社区生态丰富</td></tr><tr><td>维护成本</td><td>每个集成都要单独维护</td><td>统一接口，Server 独立迭代</td></tr><tr><td>适用场景</td><td>单一模型问答</td><td>工具链编排、企业级应用</td></tr></tbody></table></div><h2>三步上手</h2><h3>Step 1：安装 MCP Server</h3><div class="code-block"><span class="cmt"># 以文件系统 Server 为例</span>\nnpm install -g @anthropic-ai/mcp-server-fs\n\n<span class="cmt"># 或者直接 npx 运行，无需全局安装</span>\nnpx @anthropic-ai/mcp-server-fs --path /your/data</div><h3>Step 2：编写配置文件</h3><p>在项目根目录创建 <code>.mcp.json</code>：</p><div class="code-block">{\n  <span class="str">"mcpServers"</span>: {\n    <span class="str">"filesystem"</span>: {\n      <span class="str">"command"</span>: <span class="str">"npx"</span>,\n      <span class="str">"args"</span>: [<span class="str">"@anthropic-ai/mcp-server-fs"</span>],\n      <span class="str">"env"</span>: { <span class="str">"ALLOWED_PATHS"</span>: <span class="str">"/workspace/projects/data"</span> }\n    }\n  }\n}</div><h3>Step 3：开始对话！</h3><p>重启 Claude（或你的 AI 客户端），配置即刻生效。现在你可以直接说：<em>"帮我分析 data/ 目录下的所有 Excel 文件，汇总 Q1 营收"</em>——AI 会自动调用 MCP Server 读取文件并给出结果。</p><h2>国企实战三场景</h2><pre class="diagram">\n<span class="dim">┌──────────────────────────────────────────────────────┐</span>\n<span class="dim">│</span>              <span class="hl">国企 MCP 应用全景</span>                          <span class="dim">│</span>\n<span class="dim">├───────────────┬──────────────────┬───────────────────┤</span>\n<span class="dim">│</span>   <span class="gr">📊 数据分析</span>   <span class="dim">│</span>   <span class="gr">📄 文档检索</span>      <span class="dim">│</span>   <span class="gr">📋 流程自动化</span>     <span class="dim">│</span>\n<span class="dim">├───────────────┼──────────────────┼───────────────────┤</span>\n<span class="dim">│</span> 读取 Excel     <span class="dim">│</span> 语义搜索内部文档 <span class="dim">│</span> 自动生成会议纪要   <span class="dim">│</span>\n<span class="dim">│</span> 计算 IRR/NPV   <span class="dim">│</span> 合同条款智能提取 <span class="dim">│</span> 批量处理公文模板   <span class="dim">│</span>\n<span class="dim">│</span> 生成可视化图表 <span class="dim">│</span> 政策文件快速问答 <span class="dim">│</span> 数据报表定时输出   <span class="dim">│</span>\n<span class="dim">└───────────────┴──────────────────┴───────────────────┘</span>\n</pre><h3>场景一：投资数据分析</h3><p>让 Claude 直接读取本地 Excel，自动完成：</p><ul><li>导入项目财务数据，一键清洗</li><li>自动计算 <strong>IRR、NPV、ROI</strong> 等关键指标</li><li>异常数据标红预警，辅助决策</li></ul><h3>场景二：文档智能检索</h3><p>搭建内部文档 MCP 服务，实现语义搜索——告别 Ctrl+F，直接问 AI：<em>"我们去年签的所有合同里，关于违约金的条款有哪些？"</em></p><h3>场景三：流程自动化</h3><p>将高频重复任务交给 MCP：会议录音转文字 → AI 提取待办 → 自动生成纪要 → 飞书推送。全程无需人工干预。</p><div class="tip-box"><strong>🔒 安全提示</strong>：国企环境下，数据安全是第一生命线。请务必遵守：① 敏感数据仅在本地处理，不连接外网；② API 密钥用环境变量管理，禁止硬编码；③ 定期审计 MCP Server 的访问日志；④ 对数据分级分类，不同密级使用不同的 Server 实例。</div><h2>MCP Server 生态一览</h2><div class="table-wrap"><table><thead><tr><th>Server 类别</th><th>典型用途</th><th>推荐工具</th></tr></thead><tbody><tr><td>📁 文件系统</td><td>读写本地文件、目录管理</td><td>@anthropic-ai/mcp-server-fs</td></tr><tr><td>🗄️ 数据库</td><td>SQL 查询、数据操作</td><td>@anthropic-ai/mcp-server-sqlite</td></tr><tr><td>🌐 网络请求</td><td>调用 REST API、网页抓取</td><td>@anthropic-ai/mcp-server-fetch</td></tr><tr><td>🖥️ 命令行</td><td>执行 Shell 命令、脚本</td><td>@anthropic-ai/mcp-server-command</td></tr><tr><td>💬 协作工具</td><td>飞书/Slack 消息、通知</td><td>社区 Server（npm 搜索）</td></tr><tr><td>🔍 搜索引擎</td><td>Brave/Google 搜索集成</td><td>@anthropic-ai/mcp-server-brave</td></tr></tbody></table></div><div class="tip-box"><strong>🚀 行动建议</strong>：别等"完美方案"，今天就可以开始——<br>① 选一个最小场景（比如本地文件读取）；<br>② 十分钟装一个 MCP Server 试试；<br>③ 感受一下 AI 直接操作文件的丝滑体验；<br>④ 有了信心再逐步扩展到数据库、API 等复杂场景。<br>MCP 不是未来，它已经是现在。先跑起来，比什么都重要。</div>'
      },
      'state-enterprise-ai': {
        id: 'state-enterprise-ai', title: '国企数字化转型：AI能做什么？',
        category: 'AI', date: '2026-04-02', readTime: '10 min', icon: '🏢',
        tags: ['国企转型', '数字化', 'AI应用', '企业级'],
        description: '数字化转型已经不是"要不要做"的问题，而是"怎么做"的问题。今天结合我的观察和实践，聊聊 AI 在国企场景下能做什么...',
        content: '<h2>数字化转型不是选择题，而是生存题</h2><p>在国企工作了这么多年，我深刻感受到：数字化转型已经不是"要不要做"的问题，而是"怎么做"的问题。尤其是随着 AI 技术的成熟，那些率先拥抱变化的企业将获得显著的竞争优势。</p><p>今天结合我的观察和实践，聊聊 AI 在国企场景下能做什么。</p><h2>常见的应用场景</h2><h3>1. 智能文档处理</h3><p>国企日常工作中，文档处理占据了大量时间：</p><ul><li><strong>合同审核</strong>：AI 自动识别关键条款，标注风险点</li><li><strong>报告撰写</strong>：基于模板和数据自动生成初稿</li><li><strong>资料检索</strong>：从海量文档中快速找到需要的信息</li><li><strong>格式转换</strong>：PDF 转 Word、图片文字识别等</li></ul><h3>2. 数据分析与决策支持</h3><p>投资决策需要大量数据支撑：</p><div class="code-block"><span class="cmt"># 投资分析数据处理示例</span>\n<span class="kw">import</span> pandas <span class="kw">as</span> pd\n<span class="kw">import</span> numpy <span class="kw">as</span> np\n\n<span class="cmt"># 加载项目数据</span>\ndata = pd.read_csv(<span class="str">"investment_projects.csv"</span>)\n\n<span class="cmt"># 关键指标计算</span>\nirr = np.irr(data[<span class="str">\'cashflow\'</span>])\nnpv = np.npv(0.08, data[<span class="str">\'cashflow\'</span>])</div><h3>3. 智能客服与员工服务</h3><p>内部员工咨询、政策解读、流程指引等场景都可以用 AI 提升效率：</p><ul><li>政策文件智能问答</li><li>报销流程自动指引</li><li>IT 问题初步诊断</li><li>会议安排智能协调</li></ul><h2>落地的关键挑战</h2><h3>数据安全与合规</h3><p>这是最核心的问题。国企的数据往往涉及商业机密甚至国家安全，必须确保：</p><ul><li>敏感数据不出网、不上云</li><li>境外 AI 服务需要谨慎评估</li><li>建立完善的数据分级分类制度</li></ul><h3>系统集成难度</h3><p>国企的 IT 系统往往历史悠久、架构复杂，AI 集成需要充分的接口改造和适配。</p><div class="tip-box"><strong>💡 实践建议</strong>：从小场景、低风险、高价值的地方切入，比如先从内部知识库问答、文档格式转换等场景开始试点，积累经验后再逐步扩大范围。</div><h2>可行的实施路径</h2><p>基于我的观察和实践，建议按以下步骤推进：</p><ol><li><strong>场景调研</strong>：梳理高频、低风险的 AI 适用场景</li><li><strong>技术选型</strong>：根据数据安全要求选择合适的部署方式</li><li><strong>试点先行</strong>：选择1-2个部门或场景进行试点</li><li><strong>迭代优化</strong>：根据反馈持续改进，形成最佳实践</li><li><strong>规模推广</strong>：成功后再向其他场景推广</li></ol><h2>总结</h2><p>AI 不是万能药，但在很多场景下确实能显著提升效率。关键是要找准切入点，循序渐进。国企的数字化转型需要技术更需要智慧，而 AI 正是那个能够加速这一进程的强大工具。</p>'
      },
      'efficiency-tools': {
        id: 'efficiency-tools', title: '效率提升工具箱：我常用的5个AI工具',
        category: 'Tips', date: '2026-03-28', readTime: '6 min', icon: '🧰',
        tags: ['效率工具', 'AI助手', '工作流', '推荐'],
        description: '在国企工作这么多年，我用过无数效率工具，但真正能坚持下来的不多。最近一年 AI 工具爆发式增长...',
        content: '<h2>工具选型的重要性</h2><p>在国企工作这么多年，我用过无数效率工具，但真正能坚持下来的不多。最近一年 AI 工具爆发式增长，让我重新思考效率工具的选择标准：</p><ul><li><strong>够用就好</strong>：不追求功能最全，只选最适合自己的</li><li><strong>能嵌入工作流</strong>：必须能和现有工具链无缝衔接</li><li><strong>学习成本低</strong>：花最少的时间上手，产生最大的价值</li><li><strong>数据安全</strong>：尤其重要，必须可控</li></ul><h2>1. Claude — 主力写作与思考伙伴</h2><p><strong>使用场景</strong>：报告撰写、方案策划、内容润色、逻辑分析</p><p>Claude 是我目前用得最多的 AI 工具，尤其擅长：</p><ul><li>长文写作和深度分析</li><li>代码解释和优化建议</li><li>复杂问题的拆解和解答</li></ul><div class=\"tip-box\"><strong>💡 提示</strong>：在 Claude 中设置 system prompt，让它更懂你的工作背景和专业术语，回答会更精准。</div><h2>2. Claude Code — 编程与自动化助手</h2><p><strong>使用场景</strong>：代码编写、数据处理、文件批量操作、自动化脚本</p><p>Claude Code 是我近半年最惊喜的发现：</p><ul><li>用自然语言描述需求，自动生成代码</li><li>批量处理文件和数据</li><li>搭建个人知识库和工作流</li></ul><h2>3. 飞书 / Notion — 知识管理与协作</h2><p><strong>使用场景</strong>：团队协作、文档管理、项目跟进、会议纪要</p><p>我目前用飞书作为团队协作平台，配合 AI 功能：</p><ul><li>智能文档续写和总结</li><li>多维表格的自动化处理</li><li>会议纪要自动生成待办</li></ul><h2>4. Obsidian — 个人知识库</h2><p><strong>使用场景</strong>：知识沉淀、笔记整理、双向链接、长期积累</p><p>Obsidian 是我构建个人知识体系的核心：</p><ul><li>Markdown 格式，永久可用</li><li>双向链接，发现知识关联</li><li>本地存储，数据完全可控</li><li>配合 AI 实现语义搜索</li></ul><h2>5. 浏览器插件 — 随时可用的 AI</h2><p><strong>使用场景</strong>：网页阅读辅助、信息提取、快捷查询</p><p>推荐几款实用的浏览器 AI 插件：</p><ul><li><strong>Monica</strong>：网页 AI 助手，随时提问</li><li><strong>Reader Mode</strong>：去除广告，专注阅读</li><li><strong>简悦</strong>：中文阅读体验优化</li></ul><h2>我的工作流</h2><p>分享一下这些工具如何配合使用：</p><ol><li><strong>信息收集</strong>：浏览器插件 + 飞书剪藏</li><li><strong>阅读整理</strong>：Claude 摘要 + Obsidian 归档</li><li><strong>写作输出</strong>：Claude 辅助 + 飞书协作</li><li><strong>代码处理</strong>：Claude Code + VS Code</li><li><strong>知识沉淀</strong>：Obsidian 双向链接 + AI 检索</li></ol><h2>工具不在多，在于用好</h2><p>最后想说，工具只是手段，不是目的。建议：</p><ul><li>选 2-3 个核心工具深入使用</li><li>建立自己的工作流并持续优化</li><li>定期回顾，淘汰低效工具</li><li>保持开放心态，拥抱新变化</li></ul>'
      },

        category: 'AI', date: '2026-07-06', readTime: '12 min', icon: '🧠',

        description: 'AI编程助手最大的痛点是什么？不是模型不够强，而是它根本不理解你的代码结构。一个GitHub本周增长最快的开源项目，正在从根本上改变这一切...',
        content: '<div class=\"tip-box\"><strong>📌 核心要点</strong>：codebase-memory-mcp 是一个用纯C语言编写的高性能MCP服务器，它用Tree-Sitter将你的代码库索引为持久化知识图谱。Linux内核（2800万行代码）仅需3分钟完成索引，查询亚毫秒级响应，节省99%的Token消耗。有arXiv论文支撑，本周GitHub增长最快的项目。</div><h2>一、AI编程助手的「盲人摸象」困境</h2><p>你有没有观察过Claude Code或Codex是怎么探索你的项目的？</p><p>它们会不停地grep、读文件、再grep、再读文件——就像一个盲人在摸索一头大象。一个简单的「谁调用了这个函数」的问题，可能消耗上万Token，翻遍几十个文件，最后还可能遗漏跨文件的调用关系。</p><p>这不是模型的错。根本问题在于：<strong>LLM处理的是无结构的文本流，而开发者问的问题本质上是结构性的——调用链、依赖关系、模块边界、影响面分析</strong>。</p><p>在国企做投资分析的时候，我有类似的体会：一份100页的招股说明书，如果你只是从头看到尾，会迷失在海量细节里。但如果你有一张「思维导图」——股权结构、产业链关系、财务勾稽——一切就清晰了。</p><p>codebase-memory-mcp 就是给AI编程助手的那张「思维导图」。</p><h2>二、当代码库有了「地图」</h2><p>这个项目的核心思想非常简单：<strong>把代码库变成一个可查询的知识图谱</strong>。</p><p>它通过Tree-Sitter解析你的代码，提取出：</p><ul><li><strong>节点（Node）</strong>：函数、类、接口、枚举、类型、路由、文件、模块、包</li><li><strong>边（Edge）</strong>：调用关系(CALLS)、HTTP调用(HTTP_CALLS)、导入(IMPORTS)、继承(INHERITS)、装饰(DECORATES)、测试(TESTS)等20+种关系</li></ul><p>然后把这些信息存入一个SQLite数据库，通过MCP协议暴露14个工具给AI编程助手使用。</p><pre class=\"diagram\">\n<span class=\"dim\">                     ┌──────────────────────────────┐</span>\n<span class=\"dim\">                     │</span>   <span class=\"hl\">AI 编程助手</span>                <span class=\"dim\">│</span>\n<span class=\"dim\">                     │</span> (Claude Code / Codex / ...) <span class=\"dim\">│</span>\n<span class=\"dim\">                     └─────────────┬────────────────┘</span>\n<span class=\"dim\">                                   │</span> <span class=\"ye\">MCP 协议</span>\n<span class=\"dim\">                     ┌─────────────▼────────────────┐</span>\n<span class=\"dim\">                     │</span>  <span class=\"hl\">codebase-memory-mcp</span>       <span class=\"dim\">│</span>\n<span class=\"dim\">                     │</span>  <span class=\"gr\">14 MCP 工具</span>                <span class=\"dim\">│</span>\n<span class=\"dim\">                     └─────────────┬────────────────┘</span>\n<span class=\"dim\">           ┌───────────────────────┼───────────────────────┐</span>\n<span class=\"dim\">           ▼                       ▼                       ▼</span>\n<span class=\"dim\">   ┌──────────────┐      ┌──────────────┐      ┌──────────────┐</span>\n<span class=\"dim\">   │</span> <span class=\"hl\">Tree-Sitter</span>  <span class=\"dim\">│      │</span>  <span class=\"hl\">SQLite</span>      <span class=\"dim\">│      │</span>  <span class=\"hl\">Hybrid LSP</span> <span class=\"dim\">│</span>\n<span class=\"dim\">   │</span> <span class=\"gr\">158 语言</span>    <span class=\"dim\">│      │</span> <span class=\"gr\">知识图谱</span>    <span class=\"dim\">│      │</span> <span class=\"gr\">类型解析</span>   <span class=\"dim\">│</span>\n<span class=\"dim\">   │</span> AST解析      <span class=\"dim\">│      │</span> 持久化存储   <span class=\"dim\">│      │</span> 10 语言     <span class=\"dim\">│</span>\n<span class=\"dim\">   └──────────────┘      └──────────────┘      └──────────────┘</span>\n</pre><h2>三、深入引擎：三级流水线与六步调用解析</h2><p>作为一个AI开发者，我最感兴趣的是它的技术架构。这个项目最让人佩服的是——<strong>它是一个纯C语言编写的静态编译二进制文件，零运行时依赖</strong>。没有Docker，没有Python环境，下载就能跑。</p><p>它的处理流程分为三个阶段：</p><h3>阶段一：解析（Parse）</h3><p>用Tree-Sitter构建AST（抽象语法树），从66种语言中提取定义、调用、导入、引用、接口实现等信息。Tree-Sitter是增量解析引擎，这意味着后续改动只需要重新解析变化的部分。</p><h3>阶段二：构建（Build）</h3><p>这里有一个<strong>六阶段流水线</strong>，是这个项目的精髓：</p><div class=\"table-wrap\"><table><thead><tr><th>阶段</th><th>产出</th></tr></thead><tbody><tr><td>1. 结构扫描</td><td>文件/项目/包/文件夹节点 + 包含关系边</td></tr><tr><td>2. 并行提取</td><td>函数注册表 + 定义提取（worker池并行）</td></tr><tr><td>3. 并行解析</td><td>CALLS/IMPORTS/IMPLEMENTS/INHERITS等边（原子work-stealing调度）</td></tr><tr><td>4. 丰富增强</td><td>测试关系边、HTTP跨服务匹配、配置文件关联、git共变文件边</td></tr><tr><td>5. 刷入存储</td><td>批量INSERT到SQLite（WAL模式）</td></tr><tr><td>6. 后索引</td><td>Louvain社区检测、XXH3文件哈希</td></tr></tbody></table></div><h3>核心：六策略调用解析</h3><p>最难的问题是：「函数A调用了B」——但B到底在哪？</p><p>codebase-memory 使用了<strong>六层递进策略</strong>来解决这个问题：</p><ol><li><strong>导入映射精确匹配</strong>（置信度0.95）——通过import语句精确定位</li><li><strong>导入后缀回退</strong>（置信度0.85）——在导入路径中做后缀匹配</li><li><strong>同模块前缀</strong>（置信度0.90）——加所属模块名做前缀</li><li><strong>全局唯一名</strong>（置信度0.75）——反查索引中的唯一候选</li><li><strong>后缀计分</strong>（置信度0.55）——根据导入距离评分</li><li><strong>模糊匹配</strong>（置信度0.30）——字符串相似度兜底</li></ol><p>前三层策略就能搞定80%以上的调用解析。对于Python/TypeScript/Go/C++等10种语言，还引入了轻量级LSP类型解析，进一步提升精度。</p><h2>四、用数据说话：省99% Token的秘密</h2><p>这个项目不是凭空吹牛——它有发表在arXiv上的学术论文做支撑。</p><p>研究团队在31个真实代码库上做了对比实验：</p><div class=\"table-wrap\"><table><thead><tr><th>指标</th><th>传统文件探索</th><th>Codebase-Memory</th><th>提升</th></tr></thead><tbody><tr><td>回答质量</td><td>92%</td><td>83%</td><td>接近</td></tr><tr><td>Token消耗</td><td>412,000</td><td>3,400</td><td><strong>减少99.2%</strong></td></tr><tr><td>工具调用次数</td><td>基准</td><td>基准÷2.1</td><td><strong>减少52%</strong></td></tr><tr><td>图谱原生查询</td><td>基准</td><td>持平或超越</td><td><strong>19/31语言</strong></td></tr></tbody></table></div><p>性能数据同样令人震撼：</p><ul><li><strong>Linux内核</strong>（2800万行、7.5万文件）→ <strong>3分钟</strong>完成全索引，生成481万节点、772万边</li><li><strong>Django框架</strong> → <strong>6秒</strong>完成，4.9万节点、19.6万边</li><li><strong>Cypher图查询</strong> → <strong>亚毫秒</strong>级响应</li><li><strong>调用链追踪</strong>（深度5）→ <strong>不到10毫秒</strong></li></ul><div class=\"tip-box\"><strong>💡 实战数据</strong>：一位评测者用Codex+codebase-memory查询博客项目的图片处理流程，整个会话Token消耗只有238.9K（其中83%命中缓存），输出仅3.5K Token。总花费约0.3英镑（约2.7元人民币）。这就是「少说话、多查询」的力量。</div><h2>五、五分钟上手教程</h2><h3>Step 1：一键安装</h3><div class=\"code-block\"><span class=\"cmt\"># macOS / Linux 一键安装</span>\ncurl -fsSL https://raw.githubusercontent.com/DeusData/codebase-memory-mcp/main/install.sh | bash\n<span class=\"cmt\"># 可选：加 --ui 参数，附带3D图可视化界面</span>\ncurl -fsSL https://raw.githubusercontent.com/DeusData/codebase-memory-mcp/main/install.sh | bash -s -- --ui</div><h3>Step 2：索引你的项目</h3><p>重启你的AI编程助手（Claude Code/Codex/Cursor等——安装脚本会自动配置11种Agent），然后只需要一句话：</p><div class=\"code-block\"><span class=\"cmt\">在 Claude Code 或 Codex 中输入</span>\nIndex this project</div><h3>Step 3：体验「图谱优先」的编程</h3><p>现在，你可以问这些传统方式很难回答的问题：</p><div class=\"code-block\"><span class=\"cmt\">找出所有调用数据库写入的函数</span>\ntrace_call_path(function_name=\"db_write\", direction=\"inbound\", max_depth=5)\n\n<span class=\"cmt\">这个改动影响哪些模块？</span>\ndetect_changes  <span class=\"cmt\"># 自动git diff → 受影响符号 + 风险分级</span>\n\n<span class=\"cmt\">项目架构概览？</span>\nget_architecture  <span class=\"cmt\"># 语言/包/路由/热点/集群/ADR一览</span></div><h2>六、国企视角：为什么这对我很重要</h2><p>你可能会问：一个国企投资岗位的人，为什么对一个代码分析工具这么兴奋？</p><p>三个理由：</p><p><strong>第一，知识图谱思维是通用的。</strong>我做投资分析时，本质上也是在构建「企业知识图谱」——股权关系、产业链上下游、财务勾稽、竞争格局。codebase-memory 让我看到了将这种思维产品化、自动化的可能性。</p><p><strong>第二，AI工程化的核心是上下文。</strong>不管是写代码还是做投资决策，AI助手的效果取决于它能获取多少结构化上下文。codebase-memory 解决了代码领域的上下文问题，同样的思路可以迁移到文档分析、合同审核、政策解读等国企核心场景。</p><p><strong>第三，数据不出本地。</strong>全部在本地SQLite中完成，纯C静态编译零依赖——完美符合国企对数据安全的严格要求。</p><h2>七、局限与未来</h2><p>客观地说，这个项目还有一些需要关注的地方：</p><ul><li>对于图查询不擅长的任务（如理解业务逻辑注释），仍然需要传统文件探索</li><li>目前主要支持静态分析，运行时动态调用关系暂时无法捕获（虽然有ingest_traces工具做补充）</li><li>首次完整索引大项目时有CPU峰值，建议在后台执行</li></ul><p>但它的方向是对的。当AI编程助手从「盲人摸象」进化到「按图索骥」，我们离真正的AI软件工程又近了一步。</p><div class=\"tip-box\"><strong>🔥 本周GitHub趋势</strong>：codebase-memory-mcp是本周（2026-07-04）GitHub增长最快的项目，周增10,186星，总星数26,700+。MIT开源协议，102位贡献者，5,604个测试用例全部通过。已被Claude Code、Codex CLI、Gemini CLI、Cursor等11种主流AI编程工具原生集成。</div><h2>写在最后</h2><p>如果说MCP协议是AI世界的「USB接口」，那么codebase-memory-mcp就是这个接口上第一个真正解决刚需的「外设」。它用优雅的工程实现，把一个看似简单但极其困难的问题——让AI理解代码结构——解决得干净利落。</p><p>在国企数字化转型的浪潮中，理解这些底层基础设施的演进，比追逐表面的噱头更有价值。因为基础设施决定上层建筑，工具链的质量决定了我们能用AI走多远。</p>'
      }

    // Related posts data
    const relatedMap = {
      'ai-agent': ['claude-code', 'mcp-protocol'],
      'claude-code': ['ai-agent', 'efficiency-tools'],
      'mcp-protocol': ['ai-agent', 'state-enterprise-ai'],
      'state-enterprise-ai': ['ai-agent', 'efficiency-tools'],
      'efficiency-tools': ['claude-code', 'state-enterprise-ai'],
      'hot-20260706-1': ['mcp-protocol', 'ai-agent']
    };

    // ===== Render Article =====
    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');
    const article = articles[articleId];

    function renderArticle(article) {
      const container = document.getElementById('articleContent');

      const catClass = 'cat-' + article.category.toLowerCase();
      const tagsHtml = article.tags.map(t => '<span class="tag"># ' + t + '</span>').join('');

      container.innerHTML = `
        <header class="article-header">
          <span class="article-category ${catClass}">${article.category}</span>
          <h1 class="article-title">${article.title}</h1>
          <div class="article-meta">
            <span>📅 ${article.date}</span>
            <span>⏱️ ${article.readTime}</span>
          </div>
        </header>
        <div class="article-cover">${article.icon}</div>
        <div class="article-content">${article.content}</div>
        <div class="article-footer">
          <div class="tags">${tagsHtml}</div>
        </div>
        <div class="share-section">
          <span>分享：</span>
          <button class="share-btn" onclick="share('twitter')" title="Twitter">𝕏</button>
          <button class="share-btn" onclick="share('weibo')" title="微博">📢</button>
          <button class="share-btn" onclick="share('copy')" title="复制链接">🔗</button>
        </div>
      `;

      // Update SEO
      document.title = article.title + ' — Harry\'s Blog';
      document.querySelector('meta[name="description"]')?.setAttribute('content', article.description);

      // Generate TOC
      const headings = container.querySelectorAll('h2');
      const tocNav = document.getElementById('tocNav');
      tocNav.innerHTML = '';
      headings.forEach((h, i) => {
        const id = 'heading-' + i;
        h.id = id;
        const link = document.createElement('a');
        link.href = '#' + id;
        link.textContent = h.textContent;
        tocNav.appendChild(link);
      });

      // Render related posts
      const relatedIds = relatedMap[article.id] || [];
      if (relatedIds.length > 0) {
        const below = document.getElementById('belowArticle');
        const relatedHtml = relatedIds.map(id => {
          const r = articles[id];
          return '<a href="article.html?id=' + r.id + '" class="related-card"><h4>' + r.icon + ' ' + r.title + '</h4><p>' + r.description.substring(0, 60) + '...</p></a>';
        }).join('');

        below.innerHTML = `
          <div class="related-section">
            <h3>📖 相关文章</h3>
            <div class="related-grid">${relatedHtml}</div>
          </div>
          <div class="comments-section">
            <h3>💬 讨论</h3>
            <p>评论功能即将上线。如有想法，欢迎通过 <a href="mailto:your-email@example.com" style="color:var(--gold);">邮件</a> 或 <a href="https://github.com/jiegeneedcode" style="color:var(--gold);">GitHub</a> 与我交流。</p>
          </div>
        `;
      }
    }

    // Share function
    function share(platform) {
      const url = encodeURIComponent(window.location.href);
      const title = encodeURIComponent(article?.title || document.title);
      const shareUrls = {
        twitter: 'https://twitter.com/intent/tweet?url=' + url + '&text=' + title,
        weibo: 'https://service.weibo.com/share/share.php?url=' + url + '&title=' + title
      };
      if (platform === 'copy') {
        navigator.clipboard.writeText(window.location.href).then(() => {
          alert('链接已复制到剪贴板！');
        });
      } else if (shareUrls[platform]) {
        window.open(shareUrls[platform], '_blank', 'width=600,height=400');
      }
    }

    // TOC highlight on scroll
    function updateTocHighlight() {
      const headings = document.querySelectorAll('.article-content h2');
      const tocLinks = document.querySelectorAll('#tocNav a');
      let current = '';
      headings.forEach(h => {
        if (window.scrollY >= h.offsetTop - 150) current = h.id;
      });
      tocLinks.forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#' + current);
      });
    }

    if (article) {
      renderArticle(article);
      window.addEventListener('scroll', updateTocHighlight);
    } else {
      document.getElementById('articleContent').innerHTML = `
        <div style="text-align:center;padding:4rem 2rem;">
          <h2 style="color:var(--gold);margin-bottom:1rem;">文章未找到</h2>
          <p style="color:var(--text-muted);margin-bottom:2rem;">抱歉，找不到这篇文章。</p>
          <a href="posts.html" class="btn" style="display:inline-block;padding:0.8rem 2rem;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#000;text-decoration:none;border-radius:var(--radius);font-weight:600;">返回文章列表</a>
        </div>
      `;
    }

    // Scroll to top
    const scrollTop = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
      scrollTop.classList.toggle('visible', window.scrollY > 600);
    });
    scrollTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
