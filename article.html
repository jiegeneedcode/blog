<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 — Harry's Blog</title>
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://jiegeneedcode.github.io/blog/article.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold: #d4af37; --gold-light: #f4d03f; --gold-dark: #b8960c;
      --accent: #6c63ff; --accent-light: #8b83ff;
      --bg: #0a0a0f; --bg-elevated: #12121a; --bg-card: #16161f; --bg-card-hover: #1c1c28;
      --text: #e2e8f0; --text-secondary: #94a3b8; --text-muted: #64748b;
      --border: rgba(212, 175, 55, 0.12); --border-light: rgba(148, 163, 184, 0.08);
      --radius: 12px; --radius-lg: 16px; --shadow: 0 4px 20px rgba(0,0,0,0.4);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --font-cursive: 'Caveat', cursive;
    }
    [data-theme="light"] {
      --bg: #f8fafc; --bg-elevated: #ffffff; --bg-card: #ffffff; --bg-card-hover: #f1f5f9;
      --text: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
      --border: rgba(212, 175, 55, 0.2); --border-light: rgba(148, 163, 184, 0.15);
    }
    html { scroll-behavior: smooth; scroll-padding-top: 100px; }
    body {
      font-family: var(--font-sans); background: var(--bg); color: var(--text);
      line-height: 1.7; min-height: 100vh; overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* Reading progress bar */
    .reading-progress {
      position: fixed; top:0; left:0; height: 3px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
      z-index: 1001; transition: width 0.1s linear;
    }

    /* Nav */
    nav {
      position: fixed; top:3px; left:0; right:0; z-index: 1000;
      padding: 1rem 2rem;
      background: rgba(10,10,15,0.88); backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    [data-theme="light"] nav { background: rgba(248,250,252,0.88); }
    .nav-logo {
      font-family: var(--font-cursive); font-size: 1.8rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; letter-spacing: 2px;
    }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a {
      color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;
      transition: color var(--transition); text-decoration: none; position: relative;
    }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--gold); transition: width var(--transition); }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }
    .theme-toggle {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg-card);
      cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .theme-toggle:hover { border-color: var(--gold); transform: scale(1.1); }

    /* Article layout */
    .article-layout {
      display: grid; grid-template-columns: 220px 1fr 220px;
      max-width: 1400px; margin: 0 auto; padding: 7rem 2rem 3rem;
      gap: 2rem;
    }
    .article-main { min-width: 0; }
    .article-sidebar { position: sticky; top: 100px; align-self: start; max-height: calc(100vh - 120px); overflow-y: auto; }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--text-muted); text-decoration: none; font-size: 0.9rem;
      margin-bottom: 2rem; transition: color var(--transition);
    }
    .back-link:hover { color: var(--gold); }

    /* Article header */
    .article-header { margin-bottom: 2rem; }
    .article-category {
      display: inline-block; padding: 0.25rem 0.8rem;
      border-radius: 10px; font-size: 0.78rem; font-weight: 600; margin-bottom: 1rem;
    }
    .cat-ai { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .cat-dev { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .cat-tips { background: rgba(34,197,94,0.15); color: #4ade80; }

    .article-title {
      font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 800;
      line-height: 1.3; margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--text), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .article-meta {
      display: flex; gap: 1.5rem; color: var(--text-muted);
      font-size: 0.88rem; flex-wrap: wrap;
    }
    .article-cover {
      height: 280px; display: flex; align-items: center; justify-content: center;
      font-size: 5rem; border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(108,99,255,0.06), rgba(212,175,55,0.04));
      border: 1px solid var(--border); margin-bottom: 2.5rem;
    }

    /* Table of Contents */
    .toc { position: sticky; top: 100px; }
    .toc h4 {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;
      color: var(--text-muted); margin-bottom: 1rem;
    }
    .toc nav { position: static; background: none; backdrop-filter: none; border: none; padding: 0; display: block; }
    .toc nav a {
      display: block; padding: 0.35rem 0; font-size: 0.82rem;
      color: var(--text-muted); text-decoration: none;
      border-left: 2px solid transparent; padding-left: 0.75rem;
      transition: all var(--transition);
    }
    .toc nav a:hover, .toc nav a.active { color: var(--gold); border-left-color: var(--gold); }

    /* Article content */
    .article-content { font-size: 1.08rem; line-height: 1.9; color: var(--text); }
    .article-content h2 {
      font-size: 1.5rem; color: var(--gold); margin: 2.5rem 0 1rem;
      padding-left: 0.75rem; border-left: 3px solid var(--gold);
    }
    .article-content h3 { font-size: 1.2rem; margin: 2rem 0 0.75rem; color: var(--text); }
    .article-content p { margin-bottom: 1.3rem; color: var(--text-secondary); }
    .article-content ul, .article-content ol { margin: 1.2rem 0; padding-left: 1.5rem; }
    .article-content li { margin-bottom: 0.6rem; color: var(--text-secondary); }
    .article-content li::marker { color: var(--gold); }
    .article-content strong { color: var(--gold-light); font-weight: 600; }

    /* ASCII Diagram */
    .diagram {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.5rem;
      margin: 1.5rem 0; overflow-x: auto;
      font-family: var(--font-mono); font-size: 0.78rem;
      line-height: 1.45; color: var(--gold-light);
      white-space: pre;
    }
    .diagram .dim { color: #546e7a; }
    .diagram .hl { color: var(--accent-light); }
    .diagram .gr { color: #4ade80; }
    .diagram .ye { color: var(--gold-light); }

    .table-wrap {
      overflow-x: auto; margin: 1.5rem 0;
      border: 1px solid var(--border); border-radius: var(--radius);
    }
    .table-wrap table {
      width: 100%; border-collapse: collapse;
      font-size: 0.9rem;
    }
    .table-wrap th {
      background: var(--bg-card); color: var(--gold);
      padding: 0.75rem 1rem; text-align: left;
      font-weight: 600; border-bottom: 1px solid var(--border);
    }
    .table-wrap td {
      padding: 0.65rem 1rem; border-bottom: 1px solid var(--border-light);
      color: var(--text-secondary);
    }
    .table-wrap tr:last-child td { border-bottom: none; }
    .table-wrap tr:hover td { background: rgba(212,175,55,0.03); }
    .article-content a { color: var(--accent-light); text-decoration: underline; }

    /* Code blocks */
    .code-block, .article-content pre {
      background: var(--bg-card); border-radius: var(--radius);
      padding: 1.5rem; margin: 1.5rem 0; border: 1px solid var(--border);
      overflow-x: auto; font-family: var(--font-mono); font-size: 0.85rem;
      line-height: 1.7;
    }
    .code-block .kw, .code-block .keyword { color: #c792ea; }
    .code-block .str, .code-block .string { color: #c3e88d; }
    .code-block .cmt, .code-block .comment { color: #546e7a; font-style: italic; }
    .code-block .fn, .code-block .function { color: #82aaff; }
    .code-block .num, .code-block .number { color: #f78c6c; }
    .code-block .prop { color: #82aaff; }

    /* Tip box */
    .tip-box {
      background: rgba(212, 175, 55, 0.06); border-left: 4px solid var(--gold);
      padding: 1.25rem 1.5rem; border-radius: 0 var(--radius) var(--radius) 0;
      margin: 1.5rem 0;
    }
    .tip-box strong { color: var(--gold); }

    /* Share buttons */
    .share-section {
      margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .share-section span { color: var(--text-muted); font-size: 0.9rem; }
    .share-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg-card);
      cursor: pointer; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .share-btn:hover { border-color: var(--gold); transform: scale(1.15); }

    /* Article footer */
    .article-footer { margin-top: 2rem; }
    .tags {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem;
    }
    .tag {
      padding: 0.3rem 0.8rem; font-size: 0.78rem; border-radius: 6px;
      background: rgba(212,175,55,0.06); border: 1px solid var(--border);
      color: var(--gold-light);
    }

    /* Related Posts */
    .related-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .related-section h3 { font-size: 1.2rem; margin-bottom: 1.5rem; color: var(--text); }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .related-card {
      padding: 1.25rem; background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); transition: all var(--transition);
      display: block; color: inherit; text-decoration: none;
    }
    .related-card:hover { border-color: var(--gold); transform: translateY(-3px); }
    .related-card h4 { font-size: 0.95rem; margin-bottom: 0.5rem; }
    .related-card p { font-size: 0.82rem; color: var(--text-muted); }

    /* Comments placeholder */
    .comments-section {
      margin-top: 3rem; padding: 2rem;
      background: var(--bg-card); border-radius: var(--radius-lg);
      border: 1px solid var(--border); text-align: center;
    }
    .comments-section h3 { margin-bottom: 0.5rem; }
    .comments-section p { color: var(--text-muted); font-size: 0.9rem; }

    /* Scroll top */
    .scroll-top {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 100;
      width: 44px; height: 44px; border-radius: 50%; background: var(--bg-card);
      border: 1px solid var(--border); color: var(--gold); font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all var(--transition); box-shadow: var(--shadow);
    }
    .scroll-top.visible { opacity: 1; visibility: visible; }
    .scroll-top:hover { border-color: var(--gold); transform: translateY(-4px); }

    footer { text-align: center; padding: 3rem 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; }

    /* Responsive */
    @media (max-width: 1024px) {
      .article-layout { grid-template-columns: 1fr; }
      .article-sidebar { display: none; }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .article-layout { padding: 6rem 1rem 2rem; }
      .article-cover { height: 180px; font-size: 3.5rem; }
      .article-content { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Reading Progress -->
  <div class="reading-progress" id="readingProgress"></div>

  <nav>
    <a href="index.html" class="nav-logo">Harry</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="posts.html">Posts</a>
      <a href="diary.html">Diary</a>
      <a href="index.html#about">About</a>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
  </nav>

  <div class="article-layout">
    <!-- Left sidebar: TOC -->
    <aside class="article-sidebar">
      <div class="toc">
        <h4>目录</h4>
        <nav id="tocNav"></nav>
      </div>
    </aside>

    <main class="article-main">
      <a href="posts.html" class="back-link">← 返回文章列表</a>
      <div id="articleContent"></div>
    </main>

    <!-- Right sidebar: share (desktop only) -->
    <aside class="article-sidebar" style="text-align:center;">
      <h4 style="font-size:0.8rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:1rem;">分享</h4>
      <div style="display:flex;flex-direction:column;gap:0.5rem;align-items:center;">
        <button class="share-btn" onclick="share('twitter')" title="Twitter">𝕏</button>

        <button class="share-btn" onclick="share('copy')" title="复制链接">🔗</button>
      </div>
    </aside>
  </div>

  <div style="max-width:800px;margin:0 auto;padding:0 2rem 3rem;" id="belowArticle"></div>

  <footer>© 2026 Harry. Made with ❤️</footer>
  <button class="scroll-top" id="scrollTop" aria-label="Back to top">↑</button>

  <script>
    // ===== Theme =====
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('theme', next);
    });

    // ===== Reading Progress =====
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      document.getElementById('readingProgress').style.width = Math.min(progress, 100) + '%';
    });

    // ===== Article Data =====
    const articles = {
      'ai-agent': {
        id: 'ai-agent', title: 'AI Agent实战：国企投资岗位的智能化转型',
        category: 'AI', date: '2026-04-10', readTime: '18 min', icon: '🤖',
        tags: ['AI Agent', 'Claude', '效率提升', '国企数字化'],
        description: '从 AI Agent 核心架构到实战落地，手把手教你用 Agent 自动化投资研报分析、会议纪要整理和数据处理，附完整工作流图解...',
        content: '<h2>写在前面</h2>\n<p>作为一名国企投资岗位的工作人员，我每天需要处理大量的文档、报表、研报和会议纪要。自从接触了 AI Agent，我的工作方式发生了翻天覆地的变化。这篇文章将系统地分享 AI Agent 的核心原理、实战流程和我踩过的坑。</p>\n\n<h2>什么是 AI Agent？—— 一张图看懂</h2>\n<p>简单来说，AI Agent 是能够<strong>自主规划、执行任务并调用工具</strong>的智能系统。与普通 Chatbot 不同，Agent 具备「思考→行动→观察→反思」的完整闭环。</p>\n\n<pre class="diagram">\n┌─────────────────────────────────────────────────────────┐\n│                    <span class="ye">AI Agent 核心架构</span>                      │\n├─────────────────────────────────────────────────────────┤\n│                                                         │\n│   ┌──────────┐    ┌──────────┐    ┌──────────┐         │\n│   │  <span class="hl">Perceive</span> │───▶│  <span class="hl">Plan</span>    │───▶│  <span class="hl">Act</span>     │         │\n│   │  感知环境 │    │  规划步骤 │    │  执行动作 │         │\n│   └──────────┘    └──────────┘    └──────────┘         │\n│         ▲                               │               │\n│         │          ┌──────────┐         │               │\n│         └──────────│  <span class="hl">Observe</span> │◀────────┘               │\n│                    │  观察结果 │                          │\n│                    └──────────┘                          │\n│                                                         │\n│   <span class="dim">核心组件：</span>                                            │\n│   ├─ <span class="gr">LLM (大脑)</span>     推理、规划、决策                     │\n│   ├─ <span class="gr">Tools (手脚)</span>   搜索、代码、文件、API                │\n│   ├─ <span class="gr">Memory (记忆)</span>  短期/长期记忆                        │\n│   └─ <span class="gr">Planning (规划)</span> 任务分解、路径选择                      │\n└─────────────────────────────────────────────────────────┘\n</pre>\n\n<h2>Agent vs 传统 Chatbot：本质区别</h2>\n\n<div class="table-wrap"><table>\n<tr><th>维度</th><th>传统 Chatbot</th><th>AI Agent</th></tr>\n<tr><td>交互模式</td><td>一问一答，被动响应</td><td>自主循环，主动执行</td></tr>\n<tr><td>任务复杂度</td><td>单轮简单任务</td><td>多步骤复杂任务</td></tr>\n<tr><td>外部工具</td><td>无法调用</td><td>可调用搜索/代码/API</td></tr>\n<tr><td>错误处理</td><td>给出错误回答</td><td>自我反思 + 重试</td></tr>\n<tr><td>记忆能力</td><td>单次会话</td><td>跨会话持久记忆</td></tr>\n</table></div>\n\n<h2>动手实战：搭建投资研报分析 Agent</h2>\n\n<h3>Step 1：定义 Agent 的角色和能力</h3>\n<div class="code-block"><span class="cmt">// System Prompt — 定义 Agent 的「人设」和能力边界</span>\n<span class="kw">const</span> <span class="prop">systemPrompt</span> = <span class="str">`你是一位资深投资分析师，具备以下能力：\n1. 快速阅读并提炼投资研报的核心观点\n2. 识别关键财务指标并判断数据合理性\n3. 标注潜在风险点并给出风险等级\n4. 生成结构化的分析摘要（≤500字）\n\n工具列表：\n- search(reports): 搜索内部报告库\n- extract_financials(text): 提取财务数据表格\n- calculate_ratio(data): 计算核心财务比率\n- generate_summary(points): 生成最终摘要`</span>;\n</div>\n\n<h3>Step 2：Agent 的完整执行流程</h3>\n<pre class="diagram">\n<span class="dim">用户输入："分析XX新能源项目的投资可行性"</span>\n\n<span class="ye">▶ Step 1: 任务理解</span>\n  Agent 解析意图 → 识别为「投资项目可行性分析」任务\n\n<span class="ye">▶ Step 2: 任务分解</span>\n  ├─ 子任务1：搜索XX新能源的相关研报\n  ├─ 子任务2：提取关键财务数据\n  ├─ 子任务3：计算核心指标（IRR, NPV, ROI）\n  └─ 子任务4：汇总生成分析报告\n\n<span class="ye">▶ Step 3: 工具调用（循环执行）</span>\n  Round 1: search("XX新能源")  → 找到3份研报\n  Round 2: extract_financials() → 提取出营收/利润/现金流\n  Round 3: calculate_ratio()    → IRR=12.5%, NPV=+8500万\n  Round 4: 数据交叉验证         → 与行业均值对比\n\n<span class="ye">▶ Step 4: 结果汇总</span>\n  生成结构化分析报告 + 风险提示 + 投资建议\n</pre>\n\n<h2>我的日常工作场景（真实案例）</h2>\n\n<h3>场景一：投资报告快速分析</h3>\n<p>以前阅读一份50页投研报告需要<strong>2-3小时</strong>，现在：</p>\n<ol>\n  <li>Agent 通读全文，提取关键数据和结论（<strong>5分钟</strong>）</li>\n  <li>针对特定问题深度追问（如"这个项目的ROE为什么低于行业均值？"）</li>\n  <li>自动生成摘要和要点列表，直接用于内部汇报</li>\n</ol>\n\n<h3>场景二：会议纪要自动化</h3>\n<pre class="diagram">\n┌──────────────────────────────────────────────┐\n│          <span class="ye">会议纪要自动化流水线</span>                    │\n├──────────────────────────────────────────────┤\n│                                              │\n│  录音 ──▶ 语音转文字 ──▶ AI提取要点 ──▶ 纪要产出 │\n│  (手机)   (飞书妙记)     (Claude)     (Word)  │\n│                                              │\n│  <span class="dim">耗时：2-3小时 → 15分钟</span>                        │\n└──────────────────────────────────────────────┘\n</pre>\n\n<h3>场景三：Excel 智能处理</h3>\n<p>投资岗避不开 Excel，但复杂透视表和公式让人头疼。Agent 可以：</p>\n<ul>\n  <li>"解释这个 VLOOKUP 公式在做什么"</li>\n  <li>"帮我写一个宏，将12个月的数据汇总到一张总表"</li>\n  <li>"根据这组数据生成趋势分析的文字描述"</li>\n</ul>\n\n<div class="tip-box"><strong>💡 国企场景特别提醒</strong>：数据安全是底线！敏感财务数据建议用<strong>本地部署的模型</strong>（Ollama + Qwen/DeepSeek），非敏感内容才用云端模型。同时注意脱敏处理。</div>\n\n<h2>工具推荐与对比</h2>\n<div class="table-wrap"><table>\n<tr><th>工具</th><th>适用场景</th><th>优势</th><th>注意</th></tr>\n<tr><td>Claude</td><td>长篇分析、报告撰写</td><td>逻辑严密、中文优秀</td><td>需联网</td></tr>\n<tr><td>Claude Code</td><td>代码、自动化脚本</td><td>直接操作文件系统</td><td>门槛较高</td></tr>\n<tr><td>Dify</td><td>内部工作流搭建</td><td>可视化编排、可私有部署</td><td>需运维</td></tr>\n<tr><td>Ollama</td><td>本地敏感数据处理</td><td>完全本地、免费</td><td>性能依赖硬件</td></tr>\n</table></div>\n\n<h2>总结</h2>\n<p>AI Agent 的本质不是替代人，而是<strong>让一个人拥有一个团队的生产力</strong>。在国企数字化转型的大背景下，善用 Agent 的先行者将获得显著的效率优势。从一个小场景开始实践，你会惊讶于它的潜力。</p>'
      },
      'claude-code': {
        id: 'claude-code', title: '从0到1：用Claude Code构建个人知识库',
        category: 'Dev', date: '2026-04-08', readTime: '20 min', icon: '📚',
        tags: ['Claude Code', '知识管理', 'AI编程', '笔记系统'],
        description: '从 PARA 文件夹结构到 Claude Code 自动化流水线，带你搭建一套高效的个人知识管理系统。含完整架构图、配置模板和实测数据对比...',
        content: '<h2>为什么需要个人知识库？</h2>\n<p>在国企投资岗位工作，每天接收的信息量巨大：行业报告、政策文件、会议纪要、研究资料...如果没有系统化管理，信息很快变得杂乱无章。最近我用 <strong>Claude Code + Markdown + Obsidian</strong> 搭建了一套个人知识管理系统，资料归档时间从每天1小时降到15分钟。</p>\n\n<h2>系统全景架构</h2>\n<pre class="diagram">\n┌──────────────────────────────────────────────────────────────────┐\n│                    <span class="ye">个人知识库系统架构</span>                              │\n├──────────────────────────────────────────────────────────────────┤\n│                                                                  │\n│  <span class="hl">┌─────────────── 输入层 ───────────────┐</span>                      │\n│  │  网页剪藏  │  文档导入  │  语音转写  │  手动笔记  │               │\n│  │ (简悦/MarkDownload) (PDF/Word) (飞书妙记) (Obsidian)│               │\n│  └────────────────────┬─────────────────────┘                      │\n│                       ▼                                            │\n│  <span class="gr">┌─────────────── 处理层 ───────────────┐</span>                      │\n│  │           Claude Code AI引擎            │                      │\n│  │  ┌─────────┐ ┌────────┐ ┌───────────┐  │                      │\n│  │  │内容提取 │ │智能分类│ │关联发现    │  │                      │\n│  │  │摘要生成 │ │标签推荐│ │知识图谱    │  │                      │\n│  │  └─────────┘ └────────┘ └───────────┘  │                      │\n│  └────────────────────┬─────────────────────┘                      │\n│                       ▼                                            │\n│  <span class="ye">┌─────────────── 存储层 ───────────────┐</span>                      │\n│  │      Obsidian 知识库 (本地Markdown)       │                      │\n│  │  ┌──────┐  ┌──────┐  ┌──────┐  ┌──────┐ │                      │\n│  │  │Inbox │  │Projects│ │Areas │  │Resources│ │                   │\n│  │  │收件箱│  │项目  │  │领域  │  │资源库 │ │                      │\n│  │  └──────┘  └──────┘  └──────┘  └──────┘ │                      │\n│  └──────────────────────────────────────────┘                      │\n└──────────────────────────────────────────────────────────────────┘\n</pre>\n\n<h2>PARA 文件夹结构 —— 知识管理的黄金法则</h2>\n<p>我采用了 Tiago Forte 的 <strong>PARA 方法</strong>来组织知识库：</p>\n\n<div class="table-wrap"><table>\n<tr><th>文件夹</th><th>含义</th><th>存放内容</th><th>示例</th></tr>\n<tr><td>📥 Inbox</td><td>收件箱</td><td>所有新进入的资料</td><td>今天下载的研报、会议录音</td></tr>\n<tr><td>📁 Projects</td><td>进行中的项目</td><td>有明确截止日期的事</td><td>"Q2投资分析报告"</td></tr>\n<tr><td>🗂 Areas</td><td>责任领域</td><td>持续关注的事</td><td>"行业研究"、"政策法规"</td></tr>\n<tr><td>📚 Resources</td><td>参考资料</td><td>未来可能用到的</td><td>"Python笔记"、"财务模型"</td></tr>\n</table></div>\n\n<h2>快速开始：3步搭建</h2>\n\n<h3>第一步：创建项目骨架</h3>\n<div class="code-block"><span class="cmt"># 创建 PARA 目录结构</span>\nmkdir -p ~/knowledge-base/{inbox,projects,areas,resources}\n<span class="kw">cd</span> ~/knowledge-base\n\n<span class="cmt"># 初始化 Git 版本控制（知识也需要版本管理）</span>\ngit init && git add -A && git commit -m <span class="str">"init knowledge base"</span></div>\n\n<h3>第二步：编写 CLAUDE.md 配置</h3>\n<div class="code-block"><span class="cmt"># CLAUDE.md — 你的知识管理「宪章」</span>\n\n## 角色定义\n你是一个知识管理助手，服务于国企投资岗位的分析师。\n\n## 处理规则\n1. 新文档首先进入 inbox/，处理后归档\n2. 每篇笔记必须包含：标题、日期、标签、来源\n3. 投资相关文档必须标注：行业、公司、日期、风险等级\n\n## 标签体系\n- #投资/新能源  #投资/半导体  #投资/消费\n- #政策/中央  #政策/地方  #政策/行业\n- #工具/Python  #工具/Excel  #工具/Claude</div>\n\n<h3>第三步：自动化处理流水线</h3>\n<pre class="diagram">\n<span class="ye">每日处理流程（Morning Routine — 15分钟）</span>\n\n<span class="dim">08:30</span>  打开 Obsidian，检查 inbox/\n<span class="dim">08:32</span>  运行：claude "处理今天 inbox 中的新文件"\n           ├─ 提取关键信息 → 生成摘要\n           ├─ 自动分类 → 匹配标签体系\n           └─ 建立关联 → 链接到已有笔记\n<span class="dim">08:40</span>  人工复核 + 微调标题/标签\n<span class="dim">08:45</span>  归档到对应 PARA 文件夹\n</pre>\n\n<h2>进阶玩法</h2>\n<ul>\n  <li><strong>向量检索</strong>：用 ChromaDB 做语义搜索，告别关键词匹配</li>\n  <li><strong>Dataview 插件</strong>：自动生成「最近7天新增笔记」「待复习清单」</li>\n  <li><strong>定时同步</strong>：Git cron job 每小时自动 push 到私有仓库</li>\n  <li><strong>AI 周报</strong>：每周五自动汇总一周新增内容生成知识周报</li>\n</ul>\n\n<div class="tip-box"><strong>💡 最重要的建议</strong>：知识库的价值不在于「收集了多少」，而在于「消化了多少」。每周五下午固定为「知识整理时间」，回顾+总结+删除过时内容。Less is more.</div>\n\n<h2>实际效果数据</h2>\n<div class="table-wrap"><table>\n<tr><th>指标</th><th>使用前</th><th>使用后</th><th>提升</th></tr>\n<tr><td>资料归档时间</td><td>1小时/天</td><td>15分钟/天</td><td>↓75%</td></tr>\n<tr><td>信息检索速度</td><td>平均8分钟</td><td>平均2分钟</td><td>↑4x</td></tr>\n<tr><td>知识复用率</td><td>~10%</td><td>~60%</td><td>↑6x</td></tr>\n<tr><td>周报撰写时间</td><td>2小时</td><td>25分钟</td><td>↓80%</td></tr>\n</table></div>\n\n<h2>总结</h2>\n<p>个人知识库不是一天建成的。从今天开始，用一个简单的 inbox 文件夹 + Claude Code 的加持，先打造最小可用版本。坚持30天，你会发现自己再也离不开它。</p>'
      },
      'mcp-protocol': {
        id: 'mcp-protocol', title: 'MCP协议：让AI真正理解你的需求',
        category: 'AI', date: '2026-04-05', readTime: '15 min', icon: '🔗',
        tags: ['MCP', 'Claude', 'AI集成', '工具调用'],
        description: '深入解析 MCP 协议架构、Client-Server 通信机制和实战配置。含国企安全架构方案和6个社区热门 MCP Server 评测...',
        content: '<h2>MCP 是什么？—— 一句话+一张图</h2>\n<p>MCP（Model Context Protocol）是 Anthropic 推出的<strong>开放协议</strong>，让你本地的 AI 应用能安全、标准化地连接外部工具和数据。简单说，MCP 就是 <strong>AI 世界的 USB-C 接口</strong>——一个接口，连接万物。</p>\n\n<pre class="diagram">\n┌────────────────────────────────────────────────────────────────┐\n│                      <span class="ye">MCP 协议架构</span>                            │\n├────────────────────────────────────────────────────────────────┤\n│                                                                │\n│  ┌──────────────────┐         MCP Protocol        ┌──────────┐ │\n│  │                  │◄──────────────────────────▶│          │ │\n│  │   <span class="hl">MCP Client</span>      │   (JSON-RPC over stdio)  │ <span class="gr">MCP     </span> │ │\n│  │   (Claude Code,  │                            │ <span class="gr">Server  </span> │ │\n│  │    Claude Desktop)│  ┌────────────────────┐    │          │ │\n│  │                  │  │ 标准化接口定义：     │    │          │ │\n│  │                  │  │ • tools/list        │    │          │ │\n│  │                  │  │ • tools/call        │    │          │ │\n│  │                  │  │ • resources/read    │    │          │ │\n│  │                  │  │ • prompts/get       │    │          │ │\n│  │                  │  └────────────────────┘    │          │ │\n│  └──────────────────┘                            └─────┬────┘ │\n│                                                       │       │\n│                              ┌─────────────────────────┤       │\n│                              ▼                         ▼       │\n│                         ┌────────┐               ┌────────┐   │\n│                         │文件系统│               │数据库  │   │\n│                         │Server  │               │Server  │   │\n│                         └────────┘               └────────┘   │\n└────────────────────────────────────────────────────────────────┘\n</pre>\n\n<h2>为什么需要 MCP？传统方式 vs MCP 方式</h2>\n\n<div class="table-wrap"><table>\n<tr><th>对比维度</th><th>传统方式</th><th>MCP 方式</th></tr>\n<tr><td>连接方式</td><td>每个工具单独写适配代码</td><td>统一协议，即插即用</td></tr>\n<tr><td>安全性</td><td>数据上传云端处理</td><td>数据本地处理，不出网</td></tr>\n<tr><td>扩展性</td><td>添加新工具需大量开发</td><td>安装 MCP Server 即可</td></tr>\n<tr><td>标准化</td><td>各厂商接口不一致</td><td>统一的 JSON-RPC 协议</td></tr>\n<tr><td>维护成本</td><td>每个集成独立维护</td><td>社区共享，一次配置</td></tr>\n</table></div>\n\n<h2>快速上手：3个步骤</h2>\n\n<h3>Step 1：安装 MCP 服务器</h3>\n<div class="code-block"><span class="cmt"># 文件系统 MCP Server — 让 AI 读写本地文件</span>\nnpm install -g @anthropic-ai/mcp-server-fs\n\n<span class="cmt"># SQLite MCP Server — 让 AI 查询数据库</span>\nnpm install -g @anthropic-ai/mcp-server-sqlite\n\n<span class="cmt"># Brave Search MCP — 让 AI 搜索网页</span>\nnpm install -g @anthropic-ai/mcp-server-brave-search</div>\n\n<h3>Step 2：配置 MCP 服务器</h3>\n<div class="code-block">{\n  <span class="str">"mcpServers"</span>: {\n    <span class="str">"filesystem"</span>: {\n      <span class="str">"command"</span>: <span class="str">"npx"</span>,\n      <span class="str">"args"</span>: [<span class="str">"@anthropic-ai/mcp-server-fs"</span>,\n               <span class="str">"/Users/harry/projects"</span>]\n    },\n    <span class="str">"sqlite"</span>: {\n      <span class="str">"command"</span>: <span class="str">"npx"</span>,\n      <span class="str">"args"</span>: [<span class="str">"@anthropic-ai/mcp-server-sqlite"</span>,\n               <span class="str">"/Users/harry/data/investment.db"</span>]\n    }\n  }\n}</div>\n\n<h3>Step 3：像聊天一样使用</h3>\n<div class="code-block"><span class="cmt"># 直接在 Claude Code 中用自然语言操作</span>\n<span class="str">"帮我分析 projects/ 目录下所有投资报告的财务数据"</span>\n<span class="str">"查询 investment.db 中2025年新能源项目的IRR数据"</span>\n<span class="str">"批量将 reports/ 中的 PDF 文件名按日期重命名"</span></div>\n\n<h2>我在国企工作中的3个 MCP 实战场景</h2>\n\n<pre class="diagram">\n┌─────────────────────────────────────────────────────────────┐\n│               <span class="ye">MCP 在国企投资岗位的应用全景</span>                    │\n├─────────────────────────────────────────────────────────────┤\n│                                                             │\n│  <span class="hl">场景一：投资数据分析</span>                                       │\n│  ┌──────────────────────────────────────────────────────┐  │\n│  │ Excel/CSV → MCP Filesystem Server → Claude分析       │  │\n│  │ 输出：IRR对比表 + 趋势图 + 文字分析报告               │  │\n│  └──────────────────────────────────────────────────────┘  │\n│                                                             │\n│  <span class="hl">场景二：合同智能审核</span>                                       │\n│  ┌──────────────────────────────────────────────────────┐  │\n│  │ PDF合同 → MCP Filesystem → AI提取关键条款             │  │\n│  │ 输出：条款清单 + 风险标注 + 修改建议                   │  │\n│  └──────────────────────────────────────────────────────┘  │\n│                                                             │\n│  <span class="hl">场景三：内部文档检索</span>                                       │\n│  ┌──────────────────────────────────────────────────────┐  │\n│  │ 本地文档库 → MCP SQLite + Embedding → 语义搜索引擎     │  │\n│  │ 输入："找出去年关于新能源补贴的所有政策文件"           │  │\n│  └──────────────────────────────────────────────────────┘  │\n└─────────────────────────────────────────────────────────────┘\n</pre>\n\n<div class="tip-box"><strong>💡 国企安全提示</strong>：MCP 的最大优势是<strong>数据不出本地</strong>——所有文件读取、数据库查询都在本地完成，只有 AI 推理部分需要模型服务。敏感场景建议配合本地模型（Ollama + Qwen），实现<strong>完全离线运行</strong>。务必配置 ALLOWED_PATHS 白名单限制访问范围。</div>\n\n<h2>社区热门 MCP Server 一览</h2>\n<div class="table-wrap"><table>\n<tr><th>Server</th><th>能力</th><th>我的评价</th></tr>\n<tr><td>Filesystem</td><td>读写本地文件</td><td>⭐⭐⭐⭐⭐ 必备</td></tr>\n<tr><td>SQLite / PostgreSQL</td><td>数据库查询</td><td>⭐⭐⭐⭐⭐ 分析师必备</td></tr>\n<tr><td>Brave Search</td><td>网页搜索</td><td>⭐⭐⭐⭐ 调研好帮手</td></tr>\n<tr><td>Puppeteer</td><td>浏览器自动化</td><td>⭐⭐⭐⭐ 爬数据神器</td></tr>\n<tr><td>GitHub</td><td>仓库操作</td><td>⭐⭐⭐ 程序员友好</td></tr>\n<tr><td>Slack / 飞书</td><td>消息集成</td><td>⭐⭐⭐ 团队协作</td></tr>\n</table></div>\n\n<h2>总结</h2>\n<p>MCP 正在改变我们与 AI 协作的方式——从<strong>「把数据喂给 AI」</strong>到<strong>「AI 主动访问你的工具」</strong>。对于处理大量数据的投资岗位来说，这是效率跃升的关键基础设施。现在就开始配置你的第一个 MCP Server，感受「AI + 本地数据」的真正威力。</p>'
      },
      'state-enterprise-ai': {
        id: 'state-enterprise-ai', title: '国企数字化转型：AI能做什么？',
        category: 'AI', date: '2026-04-02', readTime: '17 min', icon: '🏢',
        tags: ['国企转型', '数字化', 'AI应用', '企业级'],
        description: '5大应用场景全景图 + 安全架构方案 + 5步实施路线图，深度探讨 AI 在国企的稳妥落地路径。附 Python 实战代码和风险评估框架...',
        content: '<h2>开篇：这场转型不是选择题</h2>\n<p>在国企工作多年，我深刻体会到：数字化转型已经过了<strong>「要不要做」</strong>的阶段，进入了<strong>「怎么做才安全有效」</strong>的深水区。AI 不是万能药，但在对的地方用对的方式，效果惊人。</p>\n\n<h2>AI 在国企的 5 大落地场景全景图</h2>\n<pre class="diagram">\n┌──────────────────────────────────────────────────────────────────┐\n│                  <span class="ye">国企 AI 应用场景全景图</span>                            │\n├──────────────────────────────────────────────────────────────────┤\n│                                                                  │\n│  ┌──────────┐  ┌──────────┐  ┌──────────┐  ┌──────────┐  ┌─────┤\n│  │ 📄 智能  │  │ 📊 数据  │  │ 💬 智能  │  │ 📋 流程  │  │ 🔍  │\n│  │  文档处理│  │  分析决策│  │  客服    │  │  自动化  │  │ 知识 │\n│  ├──────────┤  ├──────────┤  ├──────────┤  ├──────────┤  ├─────┤\n│  │•合同审核 │  │•投资分析 │  │•政策问答 │  │•审批流转 │  │•文档 │\n│  │•报告生成 │  │•风险预警 │  │•报销指引 │  │•报表汇总 │  │ 检索 │\n│  │•会议纪要 │  │•趋势预测 │  │•IT支持  │  │•数据填报 │  │•经验 │\n│  │•OCR识别 │  │•对标分析 │  │•培训答疑 │  │•合规检查 │  │ 沉淀 │\n│  └──────────┘  └──────────┘  └──────────┘  └──────────┘  └─────┤\n│                                                                  │\n│  <span class="gr">★ 低风险切入点 → 从「文档处理+知识检索」开始试点</span>                │\n└──────────────────────────────────────────────────────────────────┘\n</pre>\n\n<h2>深入场景：每个都值得认真对待</h2>\n\n<h3>1. 智能文档处理 — ROI 最高的入口</h3>\n<p>国企每天产出的文档量是惊人的。AI 最擅长的事情之一就是<strong>理解、提取、生成文字</strong>。</p>\n<ul>\n  <li><strong>合同智能审核</strong>：自动识别付款条款、违约责任、保密条款等关键内容，对比标准合同模板，标注差异和风险点。从2小时人工审到15分钟AI初审+人工复核。</li>\n  <li><strong>报告自动生成</strong>：基于模板和数据源（Excel/数据库），AI 生成投资分析报告的初稿框架，人只需做判断和润色。</li>\n  <li><strong>文档 OCR + 结构化</strong>：扫描件、图片中的表格数据自动提取，告别手动录入。</li>\n</ul>\n\n<h3>2. 数据分析与决策支持</h3>\n<div class="code-block"><span class="cmt"># 实战：用 Python + AI 做投资组合分析</span>\n<span class="kw">import</span> pandas <span class="kw">as</span> pd\n<span class="kw">import</span> numpy <span class="kw">as</span> np\n\n<span class="cmt"># 加载项目数据</span>\ndata = pd.read_csv(<span class="str">"portfolio_2026Q1.csv"</span>)\n\n<span class="cmt"># AI 辅助计算 + 解读</span>\n<span class="cmt"># "帮我计算这批项目的加权平均IRR，并对比2025Q4"</span>\nirr = np.irr(data[<span class="str">\'cashflow\'</span>])\nnpv = np.npv(0.08, data[<span class="str">\'cashflow\'</span>])\n\n<span class="cmt"># AI 自动生成分析结论</span>\n<span class="cmt"># "本季度IRR较上季度提升2.1个百分点，主要驱动因素是..."</span></div>\n\n<h3>3. 智能问答 — 内部的「政策百科」</h3>\n<p>基于 RAG 技术，将公司内部的制度文件、政策法规建成<strong>可问答的知识库</strong>。员工用自然语言提问，AI 精准定位原文并解读。</p>\n\n<h2>落地的最大挑战：不是技术，是安全</h2>\n<pre class="diagram">\n┌──────────────────────────────────────────────────────────────┐\n│                    <span class="ye">国企 AI 安全架构</span>                          │\n├──────────────────────────────────────────────────────────────┤\n│                                                              │\n│   ┌──────────────────────────────────────┐                   │\n│   │          <span class="gr">内网安全区（核心数据）</span>          │                   │\n│   │  ┌─────────┐ ┌─────────┐ ┌────────┐ │                   │\n│   │  │Ollama   │ │ChromaDB │ │本地文件│ │                   │\n│   │  │本地模型 │ │向量库   │ │服务器  │ │                   │\n│   │  └─────────┘ └─────────┘ └────────┘ │                   │\n│   │         ▲                           │                   │\n│   └─────────│───────────────────────────┘                   │\n│             │ 敏感数据不出此线                               │\n│   ══════════╪══════════════════════════  安全边界            │\n│             │                                               │\n│   ┌─────────│───────────────────────────┐                   │\n│   │          <span class="hl">可控外联区（非敏感内容）</span>        │                   │\n│   │  ┌──────┴────┐ ┌────────────────┐  │                   │\n│   │  │Claude API │ │内部知识库查询  │  │                   │\n│   │  │(脱敏后)   │ │(不含敏感字段)  │  │                   │\n│   │  └───────────┘ └────────────────┘  │                   │\n│   └──────────────────────────────────────┘                   │\n└──────────────────────────────────────────────────────────────┘\n</pre>\n<p><strong>核心原则</strong>：数据分级、敏感不上云、模型要可控、访问要审计。</p>\n\n<h2>5 步实施路线图</h2>\n<pre class="diagram">\n<span class="ye">Phase 1</span>  <span class="ye">Phase 2</span>    <span class="ye">Phase 3</span>    <span class="ye">Phase 4</span>     <span class="ye">Phase 5</span>\n  ▌           ▌           ▌           ▌            ▌\n  ▌  场景     ▌  技术     ▌  试点     ▌  迭代      ▌  规模\n  ▌  调研     ▌  选型     ▌  先行     ▌  优化      ▌  推广\n  ▌           ▌           ▌           ▌            ▌\n  ▼           ▼           ▼           ▼            ▼\n┌────────┐ ┌────────┐ ┌────────┐ ┌────────┐ ┌────────┐\n│梳理高频│ │选择部署│ │选1-2个 │ │根据反馈│ │形成最佳│\n│低风险  │ │方式    │ │部门试点│ │持续改进│ │实践    │\n│AI场景  │ │安全评估│ │快速验证│ │效果评估│ │全公司推│\n└────────┘ └────────┘ └────────┘ └────────┘ └────────┘\n   2周         1周         4周         4周        持续\n</pre>\n\n<div class="tip-box"><strong>💡 来自实践的建议</strong>：不要一上来就做最复杂的场景。从<strong>「内部知识库问答」</strong>或<strong>「文档格式转换」</strong>这种低风险、高感知的场景切入，让领导层和同事先感受到 AI 的便利，再逐步推进到核心业务场景。</div>\n\n<h2>总结</h2>\n<p>国企的 AI 转型需要的不是技术冒险，而是<strong>稳妥的渐进创新</strong>。找准切入点、守好安全线、让效果说话。AI 是工具，人是主角——这个认知决定了转型能走多远。</p>'
      },
      'efficiency-tools': {
        id: 'efficiency-tools', title: '效率提升工具箱：我常用的5个AI工具',
        category: 'Tips', date: '2026-03-28', readTime: '15 min', icon: '🧰',
        tags: ['效率工具', 'AI助手', '工作流', '推荐'],
        description: '5件套 AI 工具生态全解：Claude、Claude Code、Obsidian、飞书、浏览器插件。含工具联动工作流图解和对比评测表...',
        content: '<h2>工具选型：我的4条铁律</h2>\n<p>在国企工作这些年，我试过无数效率工具，能留下的不到10%。总结出4条标准：<strong>够用就好、嵌入工作流、学习成本低、数据安全可控</strong>。</p>\n\n<h2>我的 5 件套工具生态</h2>\n<pre class="diagram">\n┌──────────────────────────────────────────────────────────────────┐\n│                    <span class="ye">Harry 的 AI 工具生态（2026版）</span>                  │\n├──────────────────────────────────────────────────────────────────┤\n│                                                                  │\n│                     ┌─────────────────┐                         │\n│                     │   <span class="hl">🧠 Claude</span>     │                         │\n│                     │   思考 & 写作    │                         │\n│                     └────────┬────────┘                         │\n│                              │                                   │\n│     ┌────────────────────────┼────────────────────────┐         │\n│     │                        │                        │         │\n│     ▼                        ▼                        ▼         │\n│ ┌──────────┐          ┌──────────┐           ┌──────────┐      │\n│ │🛠 Claude │          │📝 Obsidian│          │🚀 浏览器 │      │\n│ │  Code    │          │  知识库   │           │  AI 插件  │      │\n│ │代码/自动化│         │长期沉淀   │           │即时辅助   │      │\n│ └────┬─────┘          └────┬─────┘           └────┬─────┘      │\n│      │                     │                      │              │\n│      └─────────────────────┼──────────────────────┘              │\n│                            ▼                                     │\n│                    ┌───────────────┐                             │\n│                    │  📋 飞书/Notion│                             │\n│                    │  团队协作 & 输出│                             │\n│                    └───────────────┘                             │\n└──────────────────────────────────────────────────────────────────┘\n</pre>\n\n<h2>逐一说透</h2>\n\n<h3>1. Claude — 主力写作 & 思考伙伴</h3>\n<p><strong>核心场景</strong>：报告撰写、方案策划、长文润色、逻辑推演。</p>\n<p>Claude 的中文能力在所有 AI 中第一梯队，尤其擅长处理长文本（200K token 上下文窗口）。我每天用它：</p>\n<ul>\n  <li>写投资分析报告的结构大纲</li>\n  <li>润色给领导的汇报材料（口头语→正式书面语）</li>\n  <li>分析政策文件的逻辑框架</li>\n</ul>\n<div class="tip-box"><strong>💡 技巧</strong>：建一个专属 Project，把常写的报告模板、术语表、风格偏好放进去作为 System Prompt。越具体效果越好。</div>\n\n<h3>2. Claude Code — 编程 & 自动化引擎</h3>\n<p><strong>核心场景</strong>：写脚本、处理数据、批量操作文件。</p>\n<div class="code-block"><span class="cmt"># 日常高频用法</span>\n\n<span class="cmt"># 1. 批量文件处理</span>\n<span class="str">"把 reports/ 下所有 PDF 按「日期_项目名」重命名"</span>\n\n<span class="cmt"># 2. 数据清洗</span>\n<span class="str">"处理这个 CSV：去重、填充空值、按金额降序排列"</span>\n\n<span class="cmt"># 3. 自动化脚本</span>\n<span class="str">"写一个脚本，每天17:00检查 inbox/ 有新文件就发通知"</span></div>\n\n<h3>3. Obsidian — 第二大脑</h3>\n<p><strong>核心场景</strong>：知识沉淀、笔记关联、长期积累。</p>\n<p>为什么选 Obsidian 而不是 Notion？因为它是<strong>本地 Markdown 文件 + 纯文本</strong>——你可以用任何编辑器打开，数据100%归你掌控。配合 Claude Code 可以实现自动化的知识整理。</p>\n\n<h3>4. 飞书 — 团队协作中枢</h3>\n<p><strong>核心场景</strong>：团队文档协作、会议纪要、项目管理。</p>\n<p>飞书的 AI 能力正在快速进化：多维表格的自动填充、文档的智能续写、会议纪要的自动要点提取。在国企体系内，飞书是目前生态最完整的协作平台。</p>\n\n<h3>5. 浏览器 AI 插件 — 随叫随到的助手</h3>\n<p>推荐组合：<strong>Monica</strong>（网页AI翻译+总结）+ <strong>简悦</strong>（沉浸式阅读）+ <strong>MarkDownload</strong>（一键剪藏到 Obsidian）。这个组合覆盖了「发现→阅读→保存→整理」的完整信息流。</p>\n\n<h2>工具联动：我的完美工作流</h2>\n<pre class="diagram">\n<span class="ye">一天的工作流（从信息到产出）</span>\n\n<span class="dim">07:30</span>  📱 通勤路上刷新闻\n          → Monica 插件快速翻译+摘要英文资讯\n          → MarkDownload 一键保存有价值的到 Obsidian inbox\n\n<span class="dim">09:00</span>  💼 到公司处理邮件+文档\n          → Claude 快速梳理邮件要点，提取待办\n          → Claude Code 批量处理昨天的数据文件\n\n<span class="dim">11:00</span>  📊 开会讨论投资项目\n          → 飞书妙记自动录音+转写\n          → Claude 提取会议决策项+待办+责任人\n\n<span class="dim">14:00</span>  ✍️ 写投资分析报告\n          → Claude 生成报告大纲→填充分析内容→润色定稿\n          → 飞书协作分享给团队审阅\n\n<span class="dim">16:30</span>  📝 知识整理时间（铁打不动的30分钟）\n          → Obsidian 整理今天的笔记\n          → Claude Code 自动关联已有内容、补全标签\n\n<span class="dim">17:00</span>  ✅ 下班前回顾\n          → Claude 生成今日工作总结（从Obsidian日记提取）\n</pre>\n\n<h2>工具对比速查表</h2>\n<div class="table-wrap"><table>\n<tr><th>工具</th><th>最佳场景</th><th>价格</th><th>上手难度</th><th>推荐指数</th></tr>\n<tr><td>Claude</td><td>写作、分析、思考</td><td>$20/月</td><td>低</td><td>⭐⭐⭐⭐⭐</td></tr>\n<tr><td>Claude Code</td><td>代码、自动化</td><td>免费</td><td>中</td><td>⭐⭐⭐⭐⭐</td></tr>\n<tr><td>Obsidian</td><td>知识管理</td><td>免费</td><td>中</td><td>⭐⭐⭐⭐⭐</td></tr>\n<tr><td>飞书</td><td>团队协作</td><td>免费</td><td>低</td><td>⭐⭐⭐⭐</td></tr>\n<tr><td>Monica</td><td>网页AI辅助</td><td>免费/付费</td><td>低</td><td>⭐⭐⭐⭐</td></tr>\n</table></div>\n\n<h2>结语：少即是多</h2>\n<p>选2-3个核心工具深入使用，比什么都装但什么都不精要强一万倍。工具只是手段，<strong>你能持续产出的价值</strong>才是目的。从今天开始，搭建你的最小工具栈，然后用30天养成使用习惯。</p>'
      }
    };

    // Related posts data
    const relatedMap = {
      'ai-agent': ['claude-code', 'mcp-protocol'],
      'claude-code': ['ai-agent', 'efficiency-tools'],
      'mcp-protocol': ['ai-agent', 'state-enterprise-ai'],
      'state-enterprise-ai': ['ai-agent', 'efficiency-tools'],
      'efficiency-tools': ['claude-code', 'state-enterprise-ai']
    };

    // ===== Render Article =====
    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');
    const article = articles[articleId];

    function renderArticle(article) {
      const container = document.getElementById('articleContent');

      const catClass = 'cat-' + article.category.toLowerCase();
      const tagsHtml = article.tags.map(t => '<span class="tag"># ' + t + '</span>').join('');

      container.innerHTML = `
        <header class="article-header">
          <span class="article-category ${catClass}">${article.category}</span>
          <h1 class="article-title">${article.title}</h1>
          <div class="article-meta">
            <span>📅 ${article.date}</span>
            <span>⏱️ ${article.readTime}</span>
          </div>
        </header>
        <div class="article-cover">${article.icon}</div>
        <div class="article-content">${article.content}</div>
        <div class="article-footer">
          <div class="tags">${tagsHtml}</div>
        </div>
        <div class="share-section">
          <span>分享：</span>
          <button class="share-btn" onclick="share('twitter')" title="Twitter">𝕏</button>
          <button class="share-btn" onclick="share('weibo')" title="微博">📢</button>
          <button class="share-btn" onclick="share('copy')" title="复制链接">🔗</button>
        </div>
      `;

      // Update SEO
      document.title = article.title + ' — Harry\'s Blog';
      document.querySelector('meta[name="description"]')?.setAttribute('content', article.description);

      // Generate TOC
      const headings = container.querySelectorAll('h2');
      const tocNav = document.getElementById('tocNav');
      tocNav.innerHTML = '';
      headings.forEach((h, i) => {
        const id = 'heading-' + i;
        h.id = id;
        const link = document.createElement('a');
        link.href = '#' + id;
        link.textContent = h.textContent;
        tocNav.appendChild(link);
      });

      // Render related posts
      const relatedIds = relatedMap[article.id] || [];
      if (relatedIds.length > 0) {
        const below = document.getElementById('belowArticle');
        const relatedHtml = relatedIds.map(id => {
          const r = articles[id];
          return '<a href="article.html?id=' + r.id + '" class="related-card"><h4>' + r.icon + ' ' + r.title + '</h4><p>' + r.description.substring(0, 60) + '...</p></a>';
        }).join('');

        below.innerHTML = `
          <div class="related-section">
            <h3>📖 相关文章</h3>
            <div class="related-grid">${relatedHtml}</div>
          </div>
          <div class="comments-section">
            <h3>💬 讨论</h3>
            <p>评论功能即将上线。如有想法，欢迎通过 <a href="mailto:z2982468979@163.com" style="color:var(--gold);">邮件</a> 或 <a href="https://github.com/jiegeneedcode" style="color:var(--gold);">GitHub</a> 与我交流。</p>
          </div>
        `;
      }
    }

    // Share function
    function share(platform) {
      const url = encodeURIComponent(window.location.href);
      const title = encodeURIComponent(article?.title || document.title);
      const shareUrls = {
        twitter: 'https://twitter.com/intent/tweet?url=' + url + '&text=' + title,
        weibo: 'https://service.weibo.com/share/share.php?url=' + url + '&title=' + title
      };
      if (platform === 'copy') {
        navigator.clipboard.writeText(window.location.href).then(() => {
          alert('链接已复制到剪贴板！');
        });
      } else if (shareUrls[platform]) {
        window.open(shareUrls[platform], '_blank', 'width=600,height=400');
      }
    }

    // TOC highlight on scroll
    function updateTocHighlight() {
      const headings = document.querySelectorAll('.article-content h2');
      const tocLinks = document.querySelectorAll('#tocNav a');
      let current = '';
      headings.forEach(h => {
        if (window.scrollY >= h.offsetTop - 150) current = h.id;
      });
      tocLinks.forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#' + current);
      });
    }

    if (article) {
      renderArticle(article);
      window.addEventListener('scroll', updateTocHighlight);
    } else {
      document.getElementById('articleContent').innerHTML = `
        <div style="text-align:center;padding:4rem 2rem;">
          <h2 style="color:var(--gold);margin-bottom:1rem;">文章未找到</h2>
          <p style="color:var(--text-muted);margin-bottom:2rem;">抱歉，找不到这篇文章。</p>
          <a href="posts.html" class="btn" style="display:inline-block;padding:0.8rem 2rem;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#000;text-decoration:none;border-radius:var(--radius);font-weight:600;">返回文章列表</a>
        </div>
      `;
    }

    // Scroll to top
    const scrollTop = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
      scrollTop.classList.toggle('visible', window.scrollY > 600);
    });
    scrollTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
